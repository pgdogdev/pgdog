name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/pgdogdev/pgdog-ci-base:latest
    steps:
      - uses: actions/checkout@v4
      # rust-cache restores dep fingerprints/deps but deliberately strips
      # final binaries, so linking still runs. The cache step below skips the
      # build entirely when no source has changed.
      - uses: useblacksmith/rust-cache@v3
        with:
          prefix-key: build-v1
      - name: Cache pgdog binaries
        id: pgdog-bin
        uses: actions/cache@v4
        with:
          path: |
            target/debug/pgdog
            target/release/pgdog
          key: pgdog-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', '**/*.rs') }}
      - name: Build (debug)
        if: steps.pgdog-bin.outputs.cache-hit != 'true'
        run: cargo build --bin pgdog
      - name: Build (release)
        if: steps.pgdog-bin.outputs.cache-hit != 'true'
        run: cargo build --release --bin pgdog
      - name: Upload pgdog binaries
        uses: actions/upload-artifact@v4
        with:
          name: pgdog-binaries
          path: |
            target/debug/pgdog
            target/release/pgdog
          if-no-files-found: error
          retention-days: 1

  integration:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build]
    container:
      image: ghcr.io/pgdogdev/pgdog-ci-base:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: pgbench,      script: integration/pgbench/run.sh }
          - { name: schema-sync,  script: integration/schema_sync/run.sh }
          - { name: go,           script: integration/go/run.sh }
          - { name: js,           script: integration/js/pg_tests/run.sh }
          - { name: ruby,         script: integration/ruby/run.sh }
          - { name: java,         script: integration/java/run.sh }
          - { name: mirror,       script: integration/mirror/run.sh }
          - { name: sql,          script: integration/sql/run.sh }
          - { name: toxi,         script: integration/toxi/run.sh }
          - { name: rust,         script: integration/rust/run.sh }
          - { name: python,       script: integration/python/run.sh }
          - { name: complex,      script: integration/complex/run.sh }
          - { name: dry-run,      script: integration/dry_run/run.sh }
    env:
      PGDOG_BIN: ${{ github.workspace }}/target/release/pgdog
    steps:
      - uses: actions/checkout@v4
      - name: Download pgdog binaries
        uses: actions/download-artifact@v4
        with:
          name: pgdog-binaries
          # upload-artifact@v4 strips the common ancestor (target/) from the
          # archive, so extract it back here rather than into the repo root.
          path: target
      - name: Restore exec bit on binaries
        run: chmod +x target/debug/pgdog target/release/pgdog
      - name: Setup dependencies
        run: bash integration/ci/setup.sh --with-toxi
      - name: Run ${{ matrix.name }}
        run: bash ${{ matrix.script }}
      - name: Ensure PgDog stopped
        if: always()
        run: bash integration/ci/ensure-pgdog-stopped.sh

  # Tests that launch their own docker-compose stacks. They need direct host
  # access to reach sibling containers, so we run them on the bare runner
  # rather than inside the CI base container.
  integration-docker:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: copy-data,     script: integration/copy_data/run.sh }
          - { name: load-balancer, script: integration/load_balancer/run.sh }
    env:
      PGDOG_BIN: ${{ github.workspace }}/target/release/pgdog
    steps:
      - uses: actions/checkout@v4
      - name: Download pgdog binaries
        uses: actions/download-artifact@v4
        with:
          name: pgdog-binaries
          # upload-artifact@v4 strips the common ancestor (target/) from the
          # archive, so extract it back here rather than into the repo root.
          path: target
      - name: Restore exec bit on binaries
        run: chmod +x target/debug/pgdog target/release/pgdog
      - name: Setup dependencies
        run: |
          sudo service postgresql start
          sudo -u postgres createuser --superuser --login "$(id -un)"
          sudo -u postgres createdb "$(id -un)"
          bash integration/setup.sh || (sudo service postgresql restart && bash integration/setup.sh)
          bash integration/toxi/setup.sh
      - name: Run ${{ matrix.name }}
        run: bash ${{ matrix.script }}
      - name: Ensure PgDog stopped
        if: always()
        run: bash integration/ci/ensure-pgdog-stopped.sh
