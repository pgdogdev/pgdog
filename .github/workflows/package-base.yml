name: package-base
on:
  workflow_dispatch:
  schedule:
    # Weekly: Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

env:
  REGISTRY: ghcr.io
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: base-builder
            dockerfile: docker/Dockerfile.base-builder
            platform: linux/amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - suffix: base-builder
            dockerfile: docker/Dockerfile.base-builder
            platform: linux/arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
          - suffix: base-runtime
            dockerfile: docker/Dockerfile.base-runtime
            platform: linux/amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - suffix: base-runtime
            dockerfile: docker/Dockerfile.base-runtime
            platform: linux/arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          platform='${{ matrix.platform }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.suffix }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        suffix:
          - base-builder
          - base-runtime
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.suffix }}-*
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}:latest
