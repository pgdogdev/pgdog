name: release-binaries
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach binaries to (e.g. v0.1.44)
        required: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    env:
      # release event supplies the tag; manual runs use the typed input
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: blacksmith-4vcpu-ubuntu-2404
            deb: true
          - target: aarch64-unknown-linux-gnu
            runner: blacksmith-4vcpu-ubuntu-2404-arm
            deb: true
          - target: aarch64-apple-darwin      # Apple Silicon
            runner: macos-14
    steps:
      - uses: actions/checkout@v6

      # Mirrors docker/Dockerfile.base-builder: cmake + clang for aws-lc-sys,
      # libssl-dev for openssl-sys, mold is the linker pinned in .cargo/config.toml.
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake clang pkg-config libssl-dev mold

      # openssl-sys needs Homebrew OpenSSL; bindgen/clang-sys need libclang from
      # the (keg-only) llvm formula, found via LIBCLANG_PATH.
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm pkg-config openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p pgdog

      - name: Package tarball
        run: |
          BIN=pgdog
          DIR="${BIN}-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/${BIN}" "$DIR/"
          cp README.md LICENSE "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Install cargo-deb
        if: matrix.deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build .deb
        if: matrix.deb
        run: |
          cargo deb -p pgdog --target ${{ matrix.target }} --no-build --output .
          for f in *.deb; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        # nullglob: the macOS leg produces no .deb, so let those globs vanish
        run: |
          shopt -s nullglob
          gh release upload "$TAG" \
            *.tar.gz *.tar.gz.sha256 *.deb *.deb.sha256 --clobber

      # Hand the .deb files to the apt-publish job. The macOS leg has none, so
      # only the Linux legs produce an artifact.
      - name: Stash .deb artifacts
        if: matrix.deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: "*.deb"
          if-no-files-found: error

  # Publish the freshly built .deb files to the S3-hosted APT repository.
  # deb-s3 reads and rewrites the repo manifests directly in the bucket, so it
  # adds to the existing repo incrementally — no need to mirror the repo tree.
  apt-publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: pgdog-apt
      S3_REGION: us-east-1
      DIST: stable
    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: debs
          merge-multiple: true

      - name: Install deb-s3
        run: sudo gem install deb-s3

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          # The key id deb-s3 signs the Release file with.
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "GPG_KEYID=$KEYID" >> "$GITHUB_ENV"

      - name: Publish .deb files to S3
        env:
          # deb-s3's aws-sdk version doesn't reliably read AWS_* env vars, so we
          # pass them explicitly via flags below.
          S3_AWS_ACCESS_KEY_ID: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          S3_AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          # deb-s3 shells out to gpg; passphrase-less key keeps it non-interactive.
          GPG_TTY: ""
        run: |
          shopt -s nullglob
          for f in debs/*.deb; do
            deb-s3 upload \
              --bucket "$S3_BUCKET" \
              --s3-region "$S3_REGION" \
              --access-key-id "$S3_AWS_ACCESS_KEY_ID" \
              --secret-access-key "$S3_AWS_SECRET_ACCESS_KEY" \
              --codename "$DIST" \
              --component main \
              --sign "$GPG_KEYID" \
              --preserve-versions \
              "$f"
          done
