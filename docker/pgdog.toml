[[databases]]
name = "postgres"
host = "shard_0"
role = "primary"
shard = 0

[[databases]]
name = "postgres"
host = "shard_1"
role = "primary"
shard = 1

[[databases]]
name = "postgres"
host = "shard_2"
role = "primary"
shard = 2

[[sharded_tables]]
database = "postgres"
name = "users"
column = "id"

[[sharded_tables]]
database = "postgres"
column = "user_id"

[result_cache]
enabled = true
redis_url = "redis://redis:6379"
expire_seconds = 30
max_entry_bytes = 524288
key_prefix = "pgdog:result_cache"
