[[users]]
name = "pgdog"
database = "pgdog"
password = "pgdog"
server_auth = "vault"
vault_path = "database/creds/pgdog-role"

# Client password verified against Vault static role; backend uses the
# existing dynamic role so no static Postgres credentials are stored here.
[[users]]
name = "pgdog_static"
database = "pgdog"
client_vault_path = "database/static-creds/pgdog-static-role"
server_auth = "vault"
vault_path = "database/creds/pgdog-role"
