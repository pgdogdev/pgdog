version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgdog
      POSTGRES_PASSWORD: pgdog
      POSTGRES_DB: pgdog
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgdog"]
      interval: 2s
      timeout: 5s
      retries: 10

  pgdog:
    build:
      context: ../..
      dockerfile: integration/jwt/Dockerfile.pgdog
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432"
    volumes:
      - ./keys:/keys:ro
      - ./pgdog.toml:/pgdog.toml:ro
      - ./users.toml:/users.toml:ro
    command: ["--config", "/pgdog.toml", "--users", "/users.toml"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U pgdog -d pgdog"]
      interval: 2s
      timeout: 5s
      retries: 20

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      pgdog:
        condition: service_healthy
    volumes:
      - ./keys:/keys:ro
    environment:
      PGDOG_HOST: pgdog
      PGDOG_PORT: "6432"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
