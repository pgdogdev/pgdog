apiVersion: v1
kind: ConfigMap
metadata:
  name: pgdog-config
  namespace: pgdog-test
  labels:
    app: pgdog
data:
  pgdog.toml: |
    [general]
    host = "0.0.0.0"
    port = 6432
    workers = 4
    min_pool_size = 1
    default_pool_size = 5
    pooler_mode = "transaction"
    healthcheck_interval = 30000
    idle_healthcheck_interval = 30000
    shutdown_timeout = 60000
    connect_timeout = 5000
    query_timeout = 60000
    openmetrics_port = 9090
    passthrough_auth = "enabled_plain"
    
    [admin]
    name = "admin"
    user = "admin"
    password = "admin"

    [[databases]]
    name = "*"
    host = "postgres"
    port = 5432
    role = "primary"

  users.toml: |
    [[users]]
    name = "*"
    database = "*"
